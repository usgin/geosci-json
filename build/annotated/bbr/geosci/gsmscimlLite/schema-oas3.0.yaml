    $defs:
      CustomGeometry:
        title: A custom geometry
        description: A custom geometry object type that is not one of the standard
          GeoJSON geometry types or one of the JSON-FG extensions. It is defined as
          an object with a "type" member that is not one of the GeoJSON or JSON-FG
          types. This is a mechanism to keep the schema extensible so that validation
          will also validate JSON-FG root objects with new geometry types that are
          not (yet) standardized. Readers of JSON-FG root objects that encouter an
          unknown geometry type should ignore it and treat it as if the value would
          be 'null'.
        type: object
        required:
        - type
        properties:
          type:
            type: string
            not:
              enum:
              - Feature
              - FeatureCollection
              - Point
              - MultiPoint
              - LineString
              - MultiLineString
              - Polygon
              - MultiPolygon
              - Polyhedron
              - MultiPolyhedron
              - Prism
              - MultiPrism
              - CircularString
              - CompoundCurve
              - CurvePolygon
              - MultiCurve
              - MultiSurface
              - GeometryCollection
      CustomCurve:
        title: A custom curve object
        description: A custom curve object type that is not one of the standard GeoJSON
          curve types or one of the JSON-FG extensions. It is defined as an object
          with a "type" member that is not one of the GeoJSON or JSON-FG types. This
          is a mechanism to keep the schema extensible so that validation will also
          validate JSON-FG root objects with new geometry types that are not (yet)
          standardized. Readers of JSON-FG root objects that encouter an unknown curve
          type should ignore it and treat it as if the value would be 'null'.
        type: object
        required:
        - type
        properties:
          type:
            type: string
            not:
              enum:
              - LineString
              - CircularString
              - CompoundCurve
      CustomSurface:
        title: A custom surface object
        description: A custom surface object type that is not one of the standard
          GeoJSON surface types or one of the JSON-FG extensions. It is defined as
          an object with a "type" member that is not one of the GeoJSON or JSON-FG
          types. This is a mechanism to keep the schema extensible so that validation
          will also validate JSON-FG root objects with new geometry types that are
          not (yet) standardized. Readers of JSON-FG root objects that encouter an
          unknown surface type should ignore it and treat it as if the value would
          be 'null'.
        type: object
        required:
        - type
        properties:
          type:
            type: string
            not:
              enum:
              - Polygon
              - CurvePolygon
      Point:
        title: GeoJSON Point with additional 'coordRefSys' and 'measures' members
        type: object
        required:
        - type
        - coordinates
        properties:
          type:
            enum:
            - Point
          coordRefSys:
            $ref: https://usgin.github.io/geosci-json/build/annotated/bbr/geosci/gsmscimlLite/schema-oas3.0.yaml#/x-defs/coordrefsys
          measures:
            $ref: https://usgin.github.io/geosci-json/build/annotated/bbr/geosci/gsmscimlLite/schema-oas3.0.yaml#/x-defs/measures
          coordinates:
            $ref: https://usgin.github.io/geosci-json/build/annotated/bbr/geosci/gsmscimlLite/schema-oas3.0.yaml#/x-defs/geometry-object/$defs/position
          bbox:
            $ref: https://usgin.github.io/geosci-json/build/annotated/bbr/geosci/gsmscimlLite/schema-oas3.0.yaml#/x-defs/geometry-object/$defs/bbox
      LineString:
        title: GeoJSON LineString with additional 'coordRefSys' and 'measures' members
        type: object
        required:
        - type
        - coordinates
        properties:
          type:
            enum:
            - LineString
          coordRefSys:
            $ref: https://usgin.github.io/geosci-json/build/annotated/bbr/geosci/gsmscimlLite/schema-oas3.0.yaml#/x-defs/coordrefsys
          measures:
            $ref: https://usgin.github.io/geosci-json/build/annotated/bbr/geosci/gsmscimlLite/schema-oas3.0.yaml#/x-defs/measures
          coordinates:
            type: array
            minItems: 2
            items:
              $ref: https://usgin.github.io/geosci-json/build/annotated/bbr/geosci/gsmscimlLite/schema-oas3.0.yaml#/x-defs/geometry-object/$defs/position
          bbox:
            $ref: https://usgin.github.io/geosci-json/build/annotated/bbr/geosci/gsmscimlLite/schema-oas3.0.yaml#/x-defs/geometry-object/$defs/bbox
      Polygon:
        title: GeoJSON Polygon with additional 'coordRefSys' and 'measures' members
        type: object
        required:
        - type
        - coordinates
        properties:
          type:
            enum:
            - Polygon
          coordRefSys:
            $ref: https://usgin.github.io/geosci-json/build/annotated/bbr/geosci/gsmscimlLite/schema-oas3.0.yaml#/x-defs/coordrefsys
          measures:
            $ref: https://usgin.github.io/geosci-json/build/annotated/bbr/geosci/gsmscimlLite/schema-oas3.0.yaml#/x-defs/measures
          coordinates:
            type: array
            items:
              type: array
              minItems: 4
              items:
                $ref: https://usgin.github.io/geosci-json/build/annotated/bbr/geosci/gsmscimlLite/schema-oas3.0.yaml#/x-defs/geometry-object/$defs/position
          bbox:
            $ref: https://usgin.github.io/geosci-json/build/annotated/bbr/geosci/gsmscimlLite/schema-oas3.0.yaml#/x-defs/geometry-object/$defs/bbox

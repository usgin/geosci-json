    - $ref: https://usgin.github.io/geosci-json/build/annotated/bbr/geosci/gsmscimlLite/schema-oas3.0.yaml#/x-defs/geometry-object/$defs/MultiPoint
    - $ref: https://usgin.github.io/geosci-json/build/annotated/bbr/geosci/gsmscimlLite/schema-oas3.0.yaml#/x-defs/geometry-object/$defs/LineString
    - $ref: https://usgin.github.io/geosci-json/build/annotated/bbr/geosci/gsmscimlLite/schema-oas3.0.yaml#/x-defs/geometry-object/$defs/MultiLineString
    - $ref: https://usgin.github.io/geosci-json/build/annotated/bbr/geosci/gsmscimlLite/schema-oas3.0.yaml#/x-defs/geometry-object/$defs/Polygon
    - $ref: https://usgin.github.io/geosci-json/build/annotated/bbr/geosci/gsmscimlLite/schema-oas3.0.yaml#/x-defs/geometry-object/$defs/MultiPolygon
    - $ref: https://usgin.github.io/geosci-json/build/annotated/bbr/geosci/gsmscimlLite/schema-oas3.0.yaml#/x-defs/geometry-object/$defs/GeometryCollection

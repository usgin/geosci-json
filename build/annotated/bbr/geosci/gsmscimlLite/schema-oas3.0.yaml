          - oneOf:
            - $ref: https://usgin.github.io/geosci-json/build/annotated/bbr/geosci/gsmscimlLite/schema-oas3.0.yaml#/x-defs/time/$defs/timestamp
            - type: string
              enum:
              - ..
    x-schema-source: https://schemas.opengis.net/json-fg/time.json
    x-schema-id: https://schemas.opengis.net/json-fg/time.json
    x-schema-version: https://json-schema.org/draft/2020-12/schema
    nullable: true
  place:

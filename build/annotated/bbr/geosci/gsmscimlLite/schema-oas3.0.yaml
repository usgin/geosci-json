    - $ref: https://usgin.github.io/geosci-json/build/annotated/bbr/geosci/gsmscimlLite/schema-oas3.0.yaml#/x-defs/geometry-object/$defs/CircularString
    - $ref: https://usgin.github.io/geosci-json/build/annotated/bbr/geosci/gsmscimlLite/schema-oas3.0.yaml#/x-defs/geometry-object/$defs/CompoundCurve
    - $ref: https://usgin.github.io/geosci-json/build/annotated/bbr/geosci/gsmscimlLite/schema-oas3.0.yaml#/x-defs/geometry-object/$defs/CurvePolygon

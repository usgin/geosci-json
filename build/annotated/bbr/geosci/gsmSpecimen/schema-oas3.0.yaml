                - $ref: https://usgin.github.io/geosci-json/build/annotated/bbr/geosci/gsmSpecimen/schema-oas3.0.yaml#/x-defs/metadataBuildingBlocks_build_annotated_bbr_metadata_schemaorgProperties_agentInRole_schema
              description: The property location is an association between an AnalyticalInstrument

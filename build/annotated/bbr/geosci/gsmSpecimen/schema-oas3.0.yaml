      properties:
        properties:
          type: object
          properties:
            type:
              oneOf:
              - $ref: https://usgin.github.io/geosci-json/build/annotated/bbr/geosci/gsmSpecimen/schema-oas3.0.yaml#InstrumentTypeTerm
              description: The property type:InstrumentTypeTerm reports a term from
                a controlled vocabulary that describes the category of instrument
                used in an analytical session (e.g., XRF, ICPMS, SHRIMP, etc.).
              nullable: true
            model:
              oneOf:
              - type: string

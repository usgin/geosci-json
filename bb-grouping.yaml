# Building-block grouping for the GeoSciML 4.1 JSON Schema refactor.
#
# Each top-level key under `bbs:` is a BB name (camelCase) used as:
#   - the directory under _sources/ (e.g. _sources/gsmBasicGeology/)
#   - the basename of the canonical schema file: <bb>Schema.json
#
# The `packages` list names UML leaf packages from geosciml4.1.xmi by their
# last path segment. All classes whose package_path ends with one of these
# names land in the BB.
#
# Cross-BB references: when a class in BB A references a class in BB B, the
# generator emits "$ref: ../<B>/<B>Schema.json#<ClassName>". The
# package-to-BB inverted index is built at generator startup from this file.
#
# FC profile BBs under `profiles:` are hand-authored (not driven by UML
# packages); they cross-reference FT anchors in the base BBs.

bbs:

  gsmBasicGeology:
    description: |
      GeoSciML 4.1 Basic application schema. Core feature types
      (GeologicFeature, MappedFeature, GeologicUnit, GeologicStructure
      subtypes, GeomorphologicFeature, EarthMaterial, Contact, Fold,
      Foliation, ShearDisplacementStructure, GeologicEvent) plus the
      shared GSML_DataTypes and Collection containers. The merged schema
      dispatches all 9 concrete FeatureType classes
      (AnthropogenicGeomorphologicFeature, Contact, Fold, Foliation,
      GeologicEvent, GeologicUnit, MappedFeature,
      NaturalGeomorphologicFeature, ShearDisplacementStructure) and
      accepts either single Features or FeatureCollections at the root.
    packages:
      - GeoSciMLBasic        # parent app-schema package (1 class)
      - Collection
      - GSML_DataTypes
      - GeologicEvent
      - GeologicStructure
      - GeologyBasic
      - Geomorphology

  gsmscimlLite:
    description: |
      GeoSciML 4.1 Lite profile. Flattened "View" classes that summarise
      Basic/Extension content for lightweight services (GeologicUnitView,
      ContactView, ShearDisplacementStructureView, BoreholeView, etc.).
    packages:
      - GeoSciMLLite

  gsmSpecimen:
    description: |
      Specimen building block. The wrapper dispatches two featureType
      values: SF_Specimen (hand-curated «FeatureType», ISO 19156:2011
      §8.6 — inlines SF_SamplingFeature's inherited properties since ISO
      19156 isn't in the GeoSciML XMI) and ReferenceSpecimen (a GeoSciML
      «FeatureType» from the LaboratoryAnalysis-Specimen package, used
      for named reference / type specimens). The rest of the
      LaboratoryAnalysis-Specimen library (AnalyticalInstrument,
      AnalyticalSession, GeochronologicInterpretation,
      GeologicSamplingMethod, GeologicSpecimenPreparation, Image, etc.)
      stays in `$defs` for cross-reference from SF_Specimen and from
      other BBs.
    packages:
      - LaboratoryAnalysis-Specimen   # parent (1 class)
      - Geochronology
      - GeologicSpecimen
      - LaboratoryAnalysis

  gsmEarthMaterialExtension:
    description: |
      Detailed EarthMaterial description types: CompoundMaterialDescription,
      RockMaterialDescription, MetamorphicDescription, AlterationDescription,
      ChemicalComposition, PhysicalDescription, FabricDescription, etc.
    packages:
      - EarthMaterialDetails

  gsmGeologicStructureExtension:
    description: |
      Detailed structural-geology types extending the Basic structure
      hierarchy: FoldDescription, FoliationDescription, FoldSystem, Joint,
      Fracture, DisplacementEvent, DisplacementValue, Lineation, Layering,
      NonDirectionalStructure, etc.
    packages:
      - GeologicStructureDetails

  gsmGeologicUnitExtension:
    description: |
      GeologicUnit extension: detailed unit description structures
      (GeologicUnitDescription, CompositionPart roles, etc.).
    packages:
      - GeologicUnitDetails

  gsmGeologicRelationExtension:
    description: |
      Extension package defining typed binary relations between GeologicFeature
      instances (intrusive, depositional, alteration, mappingframe, etc.) on
      top of the Basic AbstractFeatureRelation skeleton.
    packages:
      - GeologicRelation

  gsmBorehole:
    description: |
      Borehole feature type and supporting types (BoreholeDetails, intervals,
      collar, log, drilling method).
    packages:
      - Borehole

  gsmGeologicTime:
    description: |
      Geologic time, age, and chronostratigraphy: TimeScale, GSSP boundary
      points, TemporalReferenceSystem, plus the GeologicAgeDetails extension
      (which contributes GeologicEventDescription, the concrete description
      class used by GeologicEvent.gaEventDescription).
    packages:
      - GeologicTime               # parent (1 class)
      - GSSP
      - TemporalReferenceSystem
      - TimeScale
      - GeologicAgeDetails


# ---------------------------------------------------------------------------
# FC profile BBs (hand-authored, not driven by UML packages).
# ---------------------------------------------------------------------------

profiles:

  # Each profile is a FeatureCollection BB. `featureTypes` lists the
  # featureType discriminator values the profile accepts. Each value has:
  #   ref:                          cross-BB $ref to the Basic anchor (always)
  #   extensionConstraints:         scalar slot -> $ref (added as an allOf
  #                                 branch requiring that slot be the specified
  #                                 concrete Extension class)
  #   extensionConstraintsArray:    array slot -> $ref (same, for [0..*] slots)
  #   wrapAsFeature: true           wrap the referenced class with the JSON-FG
  #                                 Feature envelope (use when the source class
  #                                 is «Type», not «FeatureType»)

  gsmExtendedGeologyCollection:
    description: |
      Extended-profile FeatureCollection. Accepts the full set of 9 Basic
      featureType values (AnthropogenicGeomorphologicFeature, Contact, Fold,
      Foliation, GeologicEvent, GeologicUnit, MappedFeature,
      NaturalGeomorphologicFeature, ShearDisplacementStructure). Each
      Feature additionally requires its description slot(s) to be concrete
      Extension classes where one exists; FTs without an extension
      description slot (Anthropogenic / NaturalGeomorphologicFeature,
      MappedFeature) are pass-through.
    featureTypes:
      - name: AnthropogenicGeomorphologicFeature
        ref: ../gsmBasicGeology/gsmBasicGeologySchema.json#AnthropogenicGeomorphologicFeature
      - name: Contact
        ref: ../gsmBasicGeology/gsmBasicGeologySchema.json#Contact
        extensionConstraints:
          stContactDescription: ../gsmGeologicStructureExtension/gsmGeologicStructureExtensionSchema.json#ContactDescription
      - name: Fold
        ref: ../gsmBasicGeology/gsmBasicGeologySchema.json#Fold
        extensionConstraints:
          stFoldDescription: ../gsmGeologicStructureExtension/gsmGeologicStructureExtensionSchema.json#FoldDescription
      - name: Foliation
        ref: ../gsmBasicGeology/gsmBasicGeologySchema.json#Foliation
        extensionConstraints:
          stFoliationDescription: ../gsmGeologicStructureExtension/gsmGeologicStructureExtensionSchema.json#FoliationDescription
      - name: GeologicEvent
        ref: ../gsmBasicGeology/gsmBasicGeologySchema.json#GeologicEvent
        extensionConstraintsArray:
          gaEventDescription: ../gsmGeologicTime/gsmGeologicTimeSchema.json#GeologicEventDescription
      - name: GeologicUnit
        ref: ../gsmBasicGeology/gsmBasicGeologySchema.json#GeologicUnit
        extensionConstraintsArray:
          gbUnitDescription: ../gsmGeologicUnitExtension/gsmGeologicUnitExtensionSchema.json#GeologicUnitDescription
          gbMaterialDescription: ../gsmEarthMaterialExtension/gsmEarthMaterialExtensionSchema.json#CompoundMaterialDescription
      - name: MappedFeature
        ref: ../gsmBasicGeology/gsmBasicGeologySchema.json#MappedFeature
      - name: NaturalGeomorphologicFeature
        ref: ../gsmBasicGeology/gsmBasicGeologySchema.json#NaturalGeomorphologicFeature
      - name: ShearDisplacementStructure
        ref: ../gsmBasicGeology/gsmBasicGeologySchema.json#ShearDisplacementStructure
        extensionConstraintsArray:
          stStructureDescription: ../gsmGeologicStructureExtension/gsmGeologicStructureExtensionSchema.json#ShearDisplacementStructureDescription

  gsmEarthMaterialCollection:
    description: |
      FeatureCollection profile collecting EarthMaterial features with rich
      description content. Root featureType values are the four concrete (or
      first-class) EarthMaterial subtypes — Mineral, OrganicMaterial,
      RockMaterial, CompoundMaterial. None of these are «FeatureType» in the
      UML (all are «Type»), so the profile injects the JSON-FG Feature
      envelope around each via `wrapAsFeature: true`. The inherited
      `gbEarthMaterialDescription` slot (from the EarthMaterial parent) is
      constrained on RockMaterial and CompoundMaterial branches to require
      the corresponding concrete Extension description class.
    featureTypes:
      - name: Mineral
        ref: ../gsmEarthMaterialExtension/gsmEarthMaterialExtensionSchema.json#Mineral
        wrapAsFeature: true
      - name: OrganicMaterial
        ref: ../gsmEarthMaterialExtension/gsmEarthMaterialExtensionSchema.json#OrganicMaterial
        wrapAsFeature: true
      - name: RockMaterial
        ref: ../gsmBasicGeology/gsmBasicGeologySchema.json#RockMaterial
        wrapAsFeature: true
        extensionConstraintsArray:
          gbEarthMaterialDescription: ../gsmEarthMaterialExtension/gsmEarthMaterialExtensionSchema.json#RockMaterialDescription
      - name: CompoundMaterial
        ref: ../gsmBasicGeology/gsmBasicGeologySchema.json#CompoundMaterial
        wrapAsFeature: true
        extensionConstraintsArray:
          gbEarthMaterialDescription: ../gsmEarthMaterialExtension/gsmEarthMaterialExtensionSchema.json#CompoundMaterialDescription

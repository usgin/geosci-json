# Building-block grouping for the GeoSciML 4.1 JSON Schema refactor.
#
# Each top-level key under `bbs:` is a BB name (camelCase) used as:
#   - the directory under _sources/ (e.g. _sources/gsmBasicGeology/)
#   - the basename of the canonical schema file: <bb>Schema.json
#
# The `packages` list names UML leaf packages from geosciml4.1.xmi by their
# last path segment. All classes whose package_path ends with one of these
# names land in the BB.
#
# Cross-BB references: when a class in BB A references a class in BB B, the
# generator emits "$ref: ../<B>/<B>Schema.json#<ClassName>". The
# package-to-BB inverted index is built at generator startup from this file.
#
# FC profile BBs under `profiles:` are hand-authored (not driven by UML
# packages); they cross-reference FT anchors in the base BBs.

bbs:

  gsmBasicGeology:
    description: |
      GeoSciML 4.1 Basic application schema. Core feature types
      (GeologicFeature, MappedFeature, GeologicUnit, GeologicStructure
      subtypes, GeomorphologicFeature, EarthMaterial, Contact, Fold,
      Foliation, ShearDisplacementStructure, GeologicEvent) plus the
      shared GSML_DataTypes and Collection containers. The merged schema
      dispatches all 9 concrete FeatureType classes
      (AnthropogenicGeomorphologicFeature, Contact, Fold, Foliation,
      GeologicEvent, GeologicUnit, MappedFeature,
      NaturalGeomorphologicFeature, ShearDisplacementStructure) and
      accepts either single Features or FeatureCollections at the root.
    packages:
      - GeoSciMLBasic        # parent app-schema package (1 class)
      - Collection
      - GSML_DataTypes
      - GeologicEvent
      - GeologicStructure
      - GeologyBasic
      - Geomorphology

  gsmscimlLite:
    description: |
      GeoSciML 4.1 Lite profile. Flattened "View" classes that summarise
      Basic/Extension content for lightweight services (GeologicUnitView,
      ContactView, ShearDisplacementStructureView, BoreholeView, etc.).
    packages:
      - GeoSciMLLite

  gsmSpecimen:
    description: |
      Specimen building block. The wrapper dispatches two featureType
      values: SF_Specimen (hand-curated «FeatureType», ISO 19156:2011
      §8.6 - inlines SF_SamplingFeature's inherited properties since ISO
      19156 isn't in the GeoSciML XMI) and ReferenceSpecimen (a GeoSciML
      «FeatureType» from the LaboratoryAnalysis-Specimen package, used
      for named reference / type specimens). The rest of the
      LaboratoryAnalysis-Specimen library (AnalyticalInstrument,
      AnalyticalSession, GeochronologicInterpretation,
      GeologicSamplingMethod, GeologicSpecimenPreparation, Image, etc.)
      stays in `$defs` for cross-reference from SF_Specimen and from
      other BBs.
    packages:
      - LaboratoryAnalysis-Specimen   # parent (1 class)
      - Geochronology
      - GeologicSpecimen
      - LaboratoryAnalysis

  gsmEarthMaterial:
    description: |
      EarthMaterial building block. Combines the formerly-separate
      gsmEarthMaterialExtension DataType library (AlterationDescription,
      CompoundMaterialDescription, ChemicalComposition, FabricDescription,
      MetamorphicDescription, PhysicalDescription, ParticleGeometryDescription,
      RockMaterialDescription, plus the EarthMaterial subtype «Type» classes
      Mineral, InorganicFluid, OrganicMaterial, Organism, ConstituentPart)
      with the FC profile formerly known as gsmEarthMaterialCollection.
      The merged Feature/FC dispatcher accepts four featureType values
      (Mineral, OrganicMaterial, RockMaterial, CompoundMaterial), injecting
      the JSON-FG Feature envelope around each «Type» class via
      `wrapAsFeature`. The inherited gbEarthMaterialDescription[] slot is
      constrained to RockMaterialDescription or CompoundMaterialDescription
      on the corresponding branches.
    packages:
      - EarthMaterialDetails
    dispatch:
      - name: Mineral
        ref: "#Mineral"
        wrapAsFeature: true
      - name: OrganicMaterial
        ref: "#OrganicMaterial"
        wrapAsFeature: true
      - name: RockMaterial
        ref: ../gsmBasicGeology/gsmBasicGeologySchema.json#RockMaterial
        wrapAsFeature: true
        extensionConstraintsArray:
          gbEarthMaterialDescription: "#RockMaterialDescription"
      - name: CompoundMaterial
        ref: ../gsmBasicGeology/gsmBasicGeologySchema.json#CompoundMaterial
        wrapAsFeature: true
        extensionConstraintsArray:
          gbEarthMaterialDescription: "#CompoundMaterialDescription"

  gsmGeologicStructureExtension:
    description: |
      Detailed structural-geology types extending the Basic structure
      hierarchy: FoldDescription, FoliationDescription, FoldSystem, Joint,
      Fracture, DisplacementEvent, DisplacementValue, Lineation, Layering,
      NonDirectionalStructure, etc.
    packages:
      - GeologicStructureDetails

  gsmGeologicUnitExtension:
    description: |
      GeologicUnit extension: detailed unit description structures
      (GeologicUnitDescription, CompositionPart roles, etc.).
    packages:
      - GeologicUnitDetails

  gsmGeologicRelationExtension:
    description: |
      Extension package defining typed binary relations between GeologicFeature
      instances (intrusive, depositional, alteration, mappingframe, etc.) on
      top of the Basic AbstractFeatureRelation skeleton.
    packages:
      - GeologicRelation

  gsmBorehole:
    description: |
      Borehole feature type and supporting types (BoreholeDetails, intervals,
      collar, log, drilling method).
    packages:
      - Borehole

  gsmGeologicTime:
    description: |
      Geologic time, age, and chronostratigraphy: TimeScale, GSSP boundary
      points, TemporalReferenceSystem, plus the GeologicAgeDetails extension
      (which contributes GeologicEventDescription, the concrete description
      class used by GeologicEvent.gaEventDescription). The dispatcher
      additionally exposes two hand-curated featureTypes -
      GeochronologicEra and GeochronologicBoundary - that align to W3C
      OWL-Time (https://www.w3.org/TR/owl-time/) per Cox & Richard 2015
      "A formal model for the geologic timescale and GSSP": Era ≡
      time:ProperInterval and Boundary ≡ time:Instant, with start/end
      mapping to time:hasBeginning/time:hasEnd and member to
      time:intervalContains. Both reference the existing XMI-derived
      StratigraphicPoint / StratigraphicSection anchors for the
      rock-record link.
    packages:
      - GeologicTime               # parent (1 class)
      - GSSP
      - TemporalReferenceSystem
      - TimeScale
      - GeologicAgeDetails
    dispatch:
      - name: GeochronologicEra
        ref: "#GeochronologicEra"
      - name: GeochronologicBoundary
        ref: "#GeochronologicBoundary"
      - name: GlobalStratotypePoint
        ref: "#GlobalStratotypePoint"
      - name: GlobalStratotypeSection
        ref: "#GlobalStratotypeSection"
      - name: StratigraphicPoint
        ref: "#StratigraphicPoint"
      - name: StratigraphicSection
        ref: "#StratigraphicSection"


# ---------------------------------------------------------------------------
# FC profile BBs (hand-authored, not driven by UML packages).
# ---------------------------------------------------------------------------

profiles:

  # Each profile is a FeatureCollection BB. `featureTypes` lists the
  # featureType discriminator values the profile accepts. Each value has:
  #   ref:                          cross-BB $ref to the Basic anchor (always)
  #   extensionConstraints:         scalar slot -> $ref (added as an allOf
  #                                 branch requiring that slot be the specified
  #                                 concrete Extension class)
  #   extensionConstraintsArray:    array slot -> $ref (same, for [0..*] slots)
  #   wrapAsFeature: true           wrap the referenced class with the JSON-FG
  #                                 Feature envelope (use when the source class
  #                                 is «Type», not «FeatureType»)

  gsmExtendedGeology:
    description: |
      Extended-profile FeatureCollection. Functionally equivalent to OGC's
      geosciml_extension_featurecollection.json: accepts the 9 Basic
      featureType values (AnthropogenicGeomorphologicFeature, Contact,
      Fold, Foliation, GeologicEvent, GeologicUnit, MappedFeature,
      NaturalGeomorphologicFeature, ShearDisplacementStructure) AND the 6
      Extension structure featureType values (DisplacementEvent,
      FoldSystem, Joint, Layering, Lineation, NonDirectionalStructure).
      Each Basic Feature additionally requires its description slot(s) to
      be the concrete Extension class where one exists; Extension FTs are
      already concrete and validate against their own anchors. The profile
      also narrows every feature's relatedFeature[] items: where Basic
      accepts `oneOf [SCLinkObject, AbstractFeatureRelation]`, the
      Extended profile additionally requires each AbstractFeatureRelation
      instance to be one of the concrete subtypes from
      gsmGeologicRelationExtension (GeologicFeatureRelation or
      MaterialRelation), while still allowing by-reference SCLinkObject.
    featureTypes:
      # 9 Basic featureTypes with Extension description-slot narrowing
      - name: AnthropogenicGeomorphologicFeature
        ref: ../gsmBasicGeology/gsmBasicGeologySchema.json#AnthropogenicGeomorphologicFeature
      - name: Contact
        ref: ../gsmBasicGeology/gsmBasicGeologySchema.json#Contact
        extensionConstraints:
          stContactDescription: ../gsmGeologicStructureExtension/gsmGeologicStructureExtensionSchema.json#ContactDescription
      - name: Fold
        ref: ../gsmBasicGeology/gsmBasicGeologySchema.json#Fold
        extensionConstraints:
          stFoldDescription: ../gsmGeologicStructureExtension/gsmGeologicStructureExtensionSchema.json#FoldDescription
      - name: Foliation
        ref: ../gsmBasicGeology/gsmBasicGeologySchema.json#Foliation
        extensionConstraints:
          stFoliationDescription: ../gsmGeologicStructureExtension/gsmGeologicStructureExtensionSchema.json#FoliationDescription
      - name: GeologicEvent
        ref: ../gsmBasicGeology/gsmBasicGeologySchema.json#GeologicEvent
        extensionConstraintsArray:
          gaEventDescription: ../gsmGeologicTime/gsmGeologicTimeSchema.json#GeologicEventDescription
      - name: GeologicUnit
        ref: ../gsmBasicGeology/gsmBasicGeologySchema.json#GeologicUnit
        extensionConstraintsArray:
          gbUnitDescription: ../gsmGeologicUnitExtension/gsmGeologicUnitExtensionSchema.json#GeologicUnitDescription
          gbMaterialDescription: ../gsmEarthMaterial/gsmEarthMaterialSchema.json#CompoundMaterialDescription
      - name: MappedFeature
        ref: ../gsmBasicGeology/gsmBasicGeologySchema.json#MappedFeature
      - name: NaturalGeomorphologicFeature
        ref: ../gsmBasicGeology/gsmBasicGeologySchema.json#NaturalGeomorphologicFeature
      - name: ShearDisplacementStructure
        ref: ../gsmBasicGeology/gsmBasicGeologySchema.json#ShearDisplacementStructure
        extensionConstraintsArray:
          stStructureDescription: ../gsmGeologicStructureExtension/gsmGeologicStructureExtensionSchema.json#ShearDisplacementStructureDescription
      # 6 Extension structure featureTypes (matches OGC's
      # geosciml_extension_featurecollection.json dispatch set)
      - name: DisplacementEvent
        ref: ../gsmGeologicStructureExtension/gsmGeologicStructureExtensionSchema.json#DisplacementEvent
      - name: FoldSystem
        ref: ../gsmGeologicStructureExtension/gsmGeologicStructureExtensionSchema.json#FoldSystem
      - name: Joint
        ref: ../gsmGeologicStructureExtension/gsmGeologicStructureExtensionSchema.json#Joint
      - name: Layering
        ref: ../gsmGeologicStructureExtension/gsmGeologicStructureExtensionSchema.json#Layering
      - name: Lineation
        ref: ../gsmGeologicStructureExtension/gsmGeologicStructureExtensionSchema.json#Lineation
      - name: NonDirectionalStructure
        ref: ../gsmGeologicStructureExtension/gsmGeologicStructureExtensionSchema.json#NonDirectionalStructure
    # Profile-level narrowing applied to every dispatched feature's
    # relatedFeature[] slot. Basic emits items as
    # `oneOf [SCLinkObject, AbstractFeatureRelation]`; in this Extended
    # profile each AbstractFeatureRelation must be one of the concrete
    # relation subtypes (GeologicFeatureRelation or MaterialRelation).
    # SCLinkObject (by-reference link) remains allowed for the other arm.
    featuresConstraintsArrayAnyOf:
      relatedFeature:
        - ../gsmBasicGeology/gsmBasicGeologySchema.json#/$defs/SCLinkObject
        - ../gsmGeologicRelationExtension/gsmGeologicRelationExtensionSchema.json#GeologicFeatureRelation
        - ../gsmGeologicRelationExtension/gsmGeologicRelationExtensionSchema.json#MaterialRelation

  gsmCompleteGeology:
    description: |
      Complete-coverage FeatureCollection profile. Superset of
      gsmExtendedGeology that additionally dispatches every Feature-shaped
      class across the extension BBs: relations
      (GeologicFeatureRelation, MaterialRelation), materials
      (CompoundMaterial, Mineral, OrganicMaterial, RockMaterial), and
      geologic-time anchors (GeochronologicEra, GeochronologicBoundary,
      GlobalStratotypePoint, GlobalStratotypeSection, StratigraphicPoint,
      StratigraphicSection). The same per-Basic-FT description-slot
      narrowing and the same relatedFeature[] anyOf constraint apply.
      Use when you want a single FC schema that accepts any GeoSciML
      Feature in the model (Basic + Extension + relations + materials +
      time anchors) at the FC's top-level features[] array.
    featureTypes:
      # --- 9 Basic featureTypes with Extension description narrowing ---
      - name: AnthropogenicGeomorphologicFeature
        ref: ../gsmBasicGeology/gsmBasicGeologySchema.json#AnthropogenicGeomorphologicFeature
      - name: Contact
        ref: ../gsmBasicGeology/gsmBasicGeologySchema.json#Contact
        extensionConstraints:
          stContactDescription: ../gsmGeologicStructureExtension/gsmGeologicStructureExtensionSchema.json#ContactDescription
      - name: Fold
        ref: ../gsmBasicGeology/gsmBasicGeologySchema.json#Fold
        extensionConstraints:
          stFoldDescription: ../gsmGeologicStructureExtension/gsmGeologicStructureExtensionSchema.json#FoldDescription
      - name: Foliation
        ref: ../gsmBasicGeology/gsmBasicGeologySchema.json#Foliation
        extensionConstraints:
          stFoliationDescription: ../gsmGeologicStructureExtension/gsmGeologicStructureExtensionSchema.json#FoliationDescription
      - name: GeologicEvent
        ref: ../gsmBasicGeology/gsmBasicGeologySchema.json#GeologicEvent
        extensionConstraintsArray:
          gaEventDescription: ../gsmGeologicTime/gsmGeologicTimeSchema.json#GeologicEventDescription
      - name: GeologicUnit
        ref: ../gsmBasicGeology/gsmBasicGeologySchema.json#GeologicUnit
        extensionConstraintsArray:
          gbUnitDescription: ../gsmGeologicUnitExtension/gsmGeologicUnitExtensionSchema.json#GeologicUnitDescription
          gbMaterialDescription: ../gsmEarthMaterial/gsmEarthMaterialSchema.json#CompoundMaterialDescription
      - name: MappedFeature
        ref: ../gsmBasicGeology/gsmBasicGeologySchema.json#MappedFeature
      - name: NaturalGeomorphologicFeature
        ref: ../gsmBasicGeology/gsmBasicGeologySchema.json#NaturalGeomorphologicFeature
      - name: ShearDisplacementStructure
        ref: ../gsmBasicGeology/gsmBasicGeologySchema.json#ShearDisplacementStructure
        extensionConstraintsArray:
          stStructureDescription: ../gsmGeologicStructureExtension/gsmGeologicStructureExtensionSchema.json#ShearDisplacementStructureDescription
      # --- 6 Extension structure featureTypes ---
      - name: DisplacementEvent
        ref: ../gsmGeologicStructureExtension/gsmGeologicStructureExtensionSchema.json#DisplacementEvent
      - name: FoldSystem
        ref: ../gsmGeologicStructureExtension/gsmGeologicStructureExtensionSchema.json#FoldSystem
      - name: Joint
        ref: ../gsmGeologicStructureExtension/gsmGeologicStructureExtensionSchema.json#Joint
      - name: Layering
        ref: ../gsmGeologicStructureExtension/gsmGeologicStructureExtensionSchema.json#Layering
      - name: Lineation
        ref: ../gsmGeologicStructureExtension/gsmGeologicStructureExtensionSchema.json#Lineation
      - name: NonDirectionalStructure
        ref: ../gsmGeologicStructureExtension/gsmGeologicStructureExtensionSchema.json#NonDirectionalStructure
      # --- 2 Relation featureTypes (GeologicFeatureRelation / MaterialRelation) ---
      - name: GeologicFeatureRelation
        ref: ../gsmGeologicRelationExtension/gsmGeologicRelationExtensionSchema.json#GeologicFeatureRelation
      - name: MaterialRelation
        ref: ../gsmGeologicRelationExtension/gsmGeologicRelationExtensionSchema.json#MaterialRelation
      # --- 4 Material featureTypes (CompoundMaterial / Mineral / OrganicMaterial / RockMaterial) ---
      - name: CompoundMaterial
        ref: ../gsmBasicGeology/gsmBasicGeologySchema.json#CompoundMaterial
      - name: Mineral
        ref: ../gsmEarthMaterial/gsmEarthMaterialSchema.json#Mineral
      - name: OrganicMaterial
        ref: ../gsmEarthMaterial/gsmEarthMaterialSchema.json#OrganicMaterial
      - name: RockMaterial
        ref: ../gsmBasicGeology/gsmBasicGeologySchema.json#RockMaterial
      # --- 6 Geologic-time featureTypes ---
      - name: GeochronologicEra
        ref: ../gsmGeologicTime/gsmGeologicTimeSchema.json#GeochronologicEra
      - name: GeochronologicBoundary
        ref: ../gsmGeologicTime/gsmGeologicTimeSchema.json#GeochronologicBoundary
      - name: GlobalStratotypePoint
        ref: ../gsmGeologicTime/gsmGeologicTimeSchema.json#GlobalStratotypePoint
      - name: GlobalStratotypeSection
        ref: ../gsmGeologicTime/gsmGeologicTimeSchema.json#GlobalStratotypeSection
      - name: StratigraphicPoint
        ref: ../gsmGeologicTime/gsmGeologicTimeSchema.json#StratigraphicPoint
      - name: StratigraphicSection
        ref: ../gsmGeologicTime/gsmGeologicTimeSchema.json#StratigraphicSection
    # No profile-level relatedFeature narrowing here: gsmCompleteGeology
    # dispatches GeologicFeatureRelation and MaterialRelation as top-level
    # features, and on those classes `relatedFeature` is a singleton target
    # (oneOf [SCLinkObject, GeologicFeature]) rather than an array of
    # relations. An anyOf-array narrowing applied to every feature would
    # conflict with that singleton shape. Each feature instead validates
    # against its own class schema. Use gsmExtendedGeology when you want
    # the relatedFeature[] anyOf narrowing on Basic-feature collections.


  AnthropogenicGeomorphologicFeatureTypeTerm: treat as open
  BoreholeInclinationCode:                    treat as open
  BoreholePurposeCode:                        treat as open
  BoreholeStartPointCode:                     treat as open
  CollectionTypeTerm:                         treat as open
  CompositionPartRoleTerm:                    treat as open

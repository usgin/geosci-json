# === CodeList class → CGI vocabulary URL ====================================
#
# Lookup table for the JSON Schema `codeList` annotation emitted on each
# «CodeList»-stereotyped class. Entries are populated by name-similarity
# matching against the CGI vocabulary catalog at
# https://www.geosciml.org/resource/vocabulary/cgi/current/
#
# `treat as open` means: no CGI vocab is published for this concept; emit the
# CodeList class with `{type: string, format: uri}` and no `codeList` member.
# This matches the user policy for open Category attributes.

codelist_classes:

  # Matched against CGI catalog
  AlterationTypeTerm:        http://resource.geosciml.org/classifier/cgi/alterationtype
  BoreholeDrillingMethodCode: http://resource.geosciml.org/classifier/cgi/boreholedrillingmethod
  ConstituentPartRoleTerm:   http://resource.geosciml.org/classifier/cgi/compoundmaterialconstituentpartrole
  ContactTypeTerm:           http://resource.geosciml.org/classifier/cgi/contacttype
  ConventionCode:            http://resource.geosciml.org/classifier/cgi/conventioncode
  DeformationStyleTerm:      http://resource.geosciml.org/classifier/cgi/deformationstyle
  DescriptionPurpose:        http://resource.geosciml.org/classifier/cgi/descriptionpurpose
  DeterminationMethodTerm:   http://resource.geosciml.org/classifier/cgi/determinationmethodorientation
  EventProcessTerm:          http://resource.geosciml.org/classifier/cgi/eventprocess
  FaultTypeTerm:             http://resource.geosciml.org/classifier/cgi/faulttype
  FoliationTypeTerm:         http://resource.geosciml.org/classifier/cgi/foliationtype
  GeologicUnitPartRoleTerm:  http://resource.geosciml.org/classifier/cgi/geologicunitpartrole
  GeologicUnitTypeTerm:      http://resource.geosciml.org/classifier/cgi/geologicunittype
  LineationTypeTerm:         http://resource.geosciml.org/classifier/cgi/lineationtype
  LithologyTerm:             http://resource.geosciml.org/classifier/cgi/simplelithology
  MappingFrameTerm:          http://resource.geosciml.org/classifier/cgi/mappingframe
  MovementSenseTerm:         http://resource.geosciml.org/classifier/cgi/faultmovementsense
  MovementTypeTerm:          http://resource.geosciml.org/classifier/cgi/faultmovementtype
  ParticleTypeTerm:          http://resource.geosciml.org/classifier/cgi/particletype
  PlanarPolarityCode:        http://resource.geosciml.org/classifier/cgi/planarpolaritycode
  RankTerm:                  http://resource.geosciml.org/classifier/cgi/stratigraphicrank

  # No CGI vocab published - treat as open (emit no codeList annotation)

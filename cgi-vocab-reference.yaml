  GeologicSpecimenPreparationTerm:            treat as open
  GeologicUnitHierarchyRoleTerm:              treat as open
  InstrumentTypeTerm:                         treat as open
  IsotopicEventType:                          treat as open
  IsotopicSystemName:                         treat as open
  LinearDirectedCode:                         treat as open
  MineralNameTerm:                            treat as open
  NaturalGeomorphologicFeatureTypeTerm:       treat as open
  NonDirectionalStructureTypeTerm:            treat as open
  PhysicalPropertyTerm:                       treat as open
  RelationRoleTerm:                           treat as open

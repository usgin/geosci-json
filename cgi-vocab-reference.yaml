# GeoSciML 4.1 CGI vocabulary reference (documentation only)
#
# STATUS: this file is reference material - it is NOT consumed by the schema
# generator. It records CGI vocabulary URLs we inferred for the 35
# `SWE::Category`-typed attributes and the 47 `«CodeList»` classes during
# initial analysis. Two reasons it's no longer read by the generator:
#
#   1. `SWE::Category`-typed attributes are now encoded as `$ref` to SWE 3.0
#      `Category.json` (matches the OGC code-sprint draft, geoscimlBasic.json
#      and geoscimlLite.json). Vocabulary URLs travel in the instance via the
#      `definition`/`codeSpace`/`value` members of each Category object, not
#      via a schema-level annotation.
#
#   2. `«CodeList»` classes are encoded as `{type: string, format: uri}` with
#      a `codeList` annotation emitted only when the source UML class carries
#      an explicit `codeList` tagged value (OGC 24-017r1 req/codelists-basic).
#      GeoSciML 4.1's XMI carries zero such tags, so no annotations are
#      emitted. To enrich a class, add a `codeList` tagged value to it in EA
#      and re-export the XMI.
#
# This file remains useful as:
#   - documentation of which CGI vocabularies cover which GeoSciML attributes
#   - a starting list if you decide to add `codeList` UML tags later
#   - input for external vocabulary-binding profiles (SHACL, JSON-Forms, etc.)
#
# Source of vocabulary list: https://www.geosciml.org/resource/vocabulary/cgi/current/
# URL pattern: http://resource.geosciml.org/classifier/cgi/<vocab>
#
# Status values (per-entry, for human review):
#   matched     - vocabulary slug clearly corresponds to attribute purpose
#   checked, OK - match has been confirmed by review
#   plausible   - closest available vocabulary, may not be exact fit
#   treat as open - no fixed vocabulary; any URI accepted
#   tbd         - no published CGI vocabulary matches; needs human decision

attributes:

  # === Matched: vocabulary slug aligns directly with attribute purpose ===

  - class: CompoundMaterialDescription
    attribute: compositionCategory
    codeList: http://resource.geosciml.org/classifier/cgi/compositioncategory
    status: matched


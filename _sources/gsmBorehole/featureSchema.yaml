$schema: https://json-schema.org/draft/2020-12/schema
$id: https://schemas.usgin.org/geosci-json/gsmBorehole/gsmBoreholeFeatureSchema.json
description: 'Single-Feature dispatcher for the gsmBorehole BB. Routes by the instance''s `featureType` value to the matching
  $anchor in gsmBoreholeSchema.json. Recognised featureType values: Borehole, BoreholeInterval, OriginPosition.'
allOf:
- if:
    required:
    - featureType
    properties:
      featureType:
        const: Borehole
  then:
    $ref: gsmBoreholeSchema.json#Borehole
- if:
    required:
    - featureType
    properties:
      featureType:
        const: BoreholeInterval
  then:
    $ref: gsmBoreholeSchema.json#BoreholeInterval
- if:
    required:
    - featureType
    properties:
      featureType:
        const: OriginPosition
  then:
    $ref: gsmBoreholeSchema.json#OriginPosition
- if:
    not:
      required:
      - featureType
      properties:
        featureType:
          enum:
          - Borehole
          - BoreholeInterval
          - OriginPosition
  then: false

# Examples manifest for this building block.
# Each entry lists a title, descriptive content (Markdown),
# and one or more snippets pointing to example files.

examples:
  - title: examplegsmGeologicUnitExtensionMinimal
    content: "Minimal BeddingDescription instance — no required properties"
    snippets:
      - language: json
        ref: examples/examplegsmGeologicUnitExtensionMinimal.json
  - title: geologic unit la tojiza pluton GSO
    content: "Adapted from Loop3D-GSO/Examples/GSO-ExampleLaTojizaPluton.ttl. The source describes the La Tojiza Pluton (intrusive geologic body) with a Cambrian boundary (toj:cambrianBoundaryLaTojiza_2) decomposed into 4 segments. The intruding rock material composition references plutonic constituents; relations to surrounding rocks (gsrl:* properties in TTL) are not encoded here for brevity. Validates as a GeologicUnit feature; lives in gsmGeologicUnitExtension to illustrate Extension-content usage."
    snippets:
      - language: json
        ref: examples/geologic_unit_la_tojiza_pluton_GSO.json
  - title: geologic unit lake holmes coal measures GSO
    content: "Adapted from Loop3D-GSO/Examples/GSO-ExampleGeosciAustraliaStratUnit.ttl. The source models Geoscience Australia's Lake Holmes Coal Measures as a gsgu:Formation with a Time_Interval finishing at 27.23 MaY (Late Oligocene). Note: this example file lives in gsmGeologicUnitExtension to illustrate Extension-content usage of GeologicUnit features; the actual validation target is gsmExtendedGeologyCollection (which dispatches featureType=GeologicUnit and requires extension descriptions) or gsmscimlBasic's library schema."
    snippets:
      - language: json
        ref: examples/geologic_unit_lake_holmes_coal_measures_GSO.json
  - title: geologic unit lardeau group GSO
    content: "Adapted from Loop3D-GSO/Examples/GSO-LardeauGroup.ttl. The source describes the Lardeau Group (Trout Lake area, British Columbia) — a stratigraphic group composed of Ajax fm and Sharon Creek fm (gsrl:stratUnderlies relationships) plus additional formations in the TTL. This example encodes the Group as a top-level GeologicUnit with hierarchyLink references to constituent Formation features (left as href stubs). Source reference: ResearchGate publication 237174271 (structural geology of Lardeau Group near Trout Lake)."
    snippets:
      - language: json
        ref: examples/geologic_unit_lardeau_group_GSO.json

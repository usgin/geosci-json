$schema: https://json-schema.org/draft/2020-12/schema
$id: https://schemas.usgin.org/geosci-json/gsmscimlBasic/gsmscimlBasicFeatureSchema.json
description: 'Single-Feature dispatcher for the gsmscimlBasic BB. Routes by the instance''s `featureType` value to the matching
  $anchor in gsmscimlBasicSchema.json. Recognised featureType values: AnthropogenicGeomorphologicFeature, Contact, Fold, Foliation,
  GeologicEvent, GeologicUnit, MappedFeature, NaturalGeomorphologicFeature, ShearDisplacementStructure.'
allOf:
- if:
    required:
    - featureType
    properties:
      featureType:
        const: AnthropogenicGeomorphologicFeature
  then:
    $ref: gsmscimlBasicSchema.json#AnthropogenicGeomorphologicFeature
- if:
    required:
    - featureType
    properties:
      featureType:
        const: Contact
  then:
    $ref: gsmscimlBasicSchema.json#Contact
- if:
    required:
    - featureType
    properties:
      featureType:
        const: Fold
  then:
    $ref: gsmscimlBasicSchema.json#Fold
- if:
    required:
    - featureType
    properties:
      featureType:
        const: Foliation
  then:
    $ref: gsmscimlBasicSchema.json#Foliation
- if:
    required:
    - featureType
    properties:
      featureType:
        const: GeologicEvent
  then:
    $ref: gsmscimlBasicSchema.json#GeologicEvent
- if:
    required:
    - featureType
    properties:
      featureType:
        const: GeologicUnit
  then:
    $ref: gsmscimlBasicSchema.json#GeologicUnit
- if:
    required:
    - featureType
    properties:
      featureType:
        const: MappedFeature
  then:
    $ref: gsmscimlBasicSchema.json#MappedFeature
- if:
    required:
    - featureType
    properties:
      featureType:
        const: NaturalGeomorphologicFeature
  then:
    $ref: gsmscimlBasicSchema.json#NaturalGeomorphologicFeature
- if:
    required:
    - featureType
    properties:
      featureType:
        const: ShearDisplacementStructure
  then:
    $ref: gsmscimlBasicSchema.json#ShearDisplacementStructure
- if:
    not:
      required:
      - featureType
      properties:
        featureType:
          enum:
          - AnthropogenicGeomorphologicFeature
          - Contact
          - Fold
          - Foliation
          - GeologicEvent
          - GeologicUnit
          - MappedFeature
          - NaturalGeomorphologicFeature
          - ShearDisplacementStructure
  then: false

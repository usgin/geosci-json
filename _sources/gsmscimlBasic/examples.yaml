  - title: geologic event from GSO
    content: "Translated from https://geosciml.org/schemas/geosciml/4.0/examples/GSML4-GeologicEvent.xml — Kanimblan Orogeny, a deformation event at 335 Ma (range 325–350 Ma), Tournaisian–Serpukhovian, deep crustal setting. Validates against schemas/json/4.1/geoscimlBasic.json#GeologicEvent."

# Examples manifest for this building block.
# Each entry lists a title, descriptive content (Markdown),
# and one or more snippets pointing to example files.

examples:
  - title: contact complex
    content: "Example instance: contact_complex"
    snippets:
      - language: json
        ref: examples/contact_complex.json
  - title: contact simple
    content: "Example instance: contact_simple"

# Examples manifest for this building block.
# Each entry lists a title, descriptive content (Markdown),
# and one or more snippets pointing to example files.

examples:
  - title: examplegsmGeologicTimeMinimal
    content: "Example instance: examplegsmGeologicTimeMinimal"
    snippets:
      - language: json
        ref: examples/examplegsmGeologicTimeMinimal.json
  - title: geochronologic boundary simple
    content: "Example instance: geochronologic_boundary_simple"
    snippets:
      - language: json
        ref: examples/geochronologic_boundary_simple.json
  - title: geochronologic era complex
    content: "Example instance: geochronologic_era_complex"
    snippets:
      - language: json
        ref: examples/geochronologic_era_complex.json
  - title: geochronologic era lower jurassic GSO
    content: "Adapted from Loop3D-GSO/Examples/GSO-ExampleEpochLowerJurassic.ttl. The source TTL describes a chronostratigraphic Series (`Lower_Jurassic_Series`, gsgu:Series) that `gsoc:hosts gstime:LowerJurassic2012` — the time-side ICS Epoch. Encoded here as a GeochronologicEra (≡ time:ProperInterval per OWL-Time / Cox & Richard 2015) representing the Lower Jurassic Epoch. The Epoch is bounded by the base-of-Hettangian GSSP (= base of Jurassic, ratified at Kuhjoch, Austria) and the base-of-Bajocian (the top of Toarcian / base of Middle Jurassic). The Series rock unit from the TTL is referenced via `stratotype`. As the TTL notes, the ICS time scale does not formally define stratotypes for its Geochronologic Eras; the stratotype here is the GeoSciML-side rock-unit anchor."
    snippets:
      - language: json
        ref: examples/geochronologic_era_lower_jurassic_GSO.json
  - title: geochronologic era simple
    content: "Example instance: geochronologic_era_simple"
    snippets:
      - language: json
        ref: examples/geochronologic_era_simple.json

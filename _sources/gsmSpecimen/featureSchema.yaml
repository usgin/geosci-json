$schema: https://json-schema.org/draft/2020-12/schema
$id: https://schemas.usgin.org/geosci-json/gsmSpecimen/gsmSpecimenFeatureSchema.json
description: 'Single-Feature dispatcher for the gsmSpecimen BB. Routes by the instance''s `featureType` value to the matching
  $anchor in gsmSpecimenSchema.json. Recognised featureType values: AnalyticalInstrument, AnalyticalProcess, AnalyticalSession,
  GeochronologicInterpretation, GeologicSamplingMethod, Image, ReferenceSpecimen.'
allOf:
- if:
    required:
    - featureType
    properties:
      featureType:
        const: AnalyticalInstrument
  then:
    $ref: gsmSpecimenSchema.json#AnalyticalInstrument
- if:
    required:
    - featureType
    properties:
      featureType:
        const: AnalyticalProcess
  then:
    $ref: gsmSpecimenSchema.json#AnalyticalProcess
- if:
    required:
    - featureType
    properties:
      featureType:
        const: AnalyticalSession
  then:
    $ref: gsmSpecimenSchema.json#AnalyticalSession
- if:
    required:
    - featureType
    properties:
      featureType:
        const: GeochronologicInterpretation
  then:
    $ref: gsmSpecimenSchema.json#GeochronologicInterpretation
- if:
    required:
    - featureType
    properties:
      featureType:
        const: GeologicSamplingMethod
  then:
    $ref: gsmSpecimenSchema.json#GeologicSamplingMethod
- if:
    required:
    - featureType
    properties:
      featureType:
        const: Image
  then:
    $ref: gsmSpecimenSchema.json#Image
- if:
    required:
    - featureType
    properties:
      featureType:
        const: ReferenceSpecimen
  then:
    $ref: gsmSpecimenSchema.json#ReferenceSpecimen
- if:
    not:
      required:
      - featureType
      properties:
        featureType:
          enum:
          - AnalyticalInstrument
          - AnalyticalProcess
          - AnalyticalSession
          - GeochronologicInterpretation
          - GeologicSamplingMethod
          - Image
          - ReferenceSpecimen
  then: false

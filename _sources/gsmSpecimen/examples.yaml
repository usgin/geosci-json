# Examples manifest for this building block.
# Each entry lists a title, descriptive content (Markdown),
# and one or more snippets pointing to example files.

examples:
  - title: specimen drill core segment
    content: "SF_Specimen example — a drill-core segment from a borehole. Exercises the required SF_SamplingFeature inherited properties (sampledFeature, samplingTime, materialClass) plus optional own properties (samplingMethod, processingDetails, size, currentLocation, specimenType) and the relatedSamplingFeature self-association linking to the parent borehole interval that produced it."
    snippets:
      - language: json
        ref: examples/specimen_drill_core_segment.json

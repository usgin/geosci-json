# Examples manifest for this building block.
# Each entry lists a title, descriptive content (Markdown),
# and one or more snippets pointing to example files.

examples:
  - title: fc extended minimal
    content: "Minimal Extended-profile FeatureCollection. The Extended profile dispatches on featureType into the Basic anchors with extra description-slot constraints. Each constraint only fires when the slot is present, so a minimal instance with no description content still validates and exercises the dispatcher routing."
    snippets:
      - language: json
        ref: examples/fc_extended_minimal.json
  - title: fc hammersley fault traces GSO
    content: "Adapted from Loop3D-GSO/Examples/GSO-ExampleHammerslyData.ttl (Hamersley region, Western Australia). The source TTL distinguishes between fault STRUCTURES (Moona Fault, fault_A1, fault_A2, fault_3496 - typed as gsfa:High_Angle_Fault) and fault TRACES on the earth surface (faulttrace_11445, faulttrace_15546, faulttrace_3496, faulttrace_7439 - typed as gsfa:Fault and hosted by gsoc:earthsurface, isPartOf the parent fault structure). The traces correspond well to MappedFeature instances representing the surface expression of a buried/subsurface ShearDisplacementStructure. This FC encodes the four fault traces as MappedFeature features and notes the spatial-relationship attributes (gsrl:spatiallyTouches, gsrl:spatiallyTruncates) in comments. The Extended profile's MappedFeature branch is pass-through (no extension description slot), so this validates against the same dispatcher as the Basic profile would."
    snippets:
      - language: json
        ref: examples/fc_hammersley_fault_traces_GSO.json

$schema: https://json-schema.org/draft/2020-12/schema
$id: https://schemas.usgin.org/geosci-json/gsmscimlLite/gsmscimlLiteFeatureCollectionSchema.json
description: 'FeatureCollection wrapper for the gsmscimlLite BB. Combines json-fg/featurecollection.json with per-item dispatch
  via gsmscimlLiteFeatureSchema.json. Recognised featureType values for items: BoreholeView, ContactView, GeologicSpecimenView,
  GeologicUnitView, GeomorphologicUnitView, ShearDisplacementStructureView, SiteObservationView.'
allOf:
- $ref: https://schemas.opengis.net/json-fg/featurecollection.json
- type: object
  properties:
    features:
      type: array
      items:
        $ref: gsmscimlLiteFeatureSchema.json
